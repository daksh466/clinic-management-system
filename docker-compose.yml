version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: clinicdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build: ./backend
    environment:
      POSTGRES_DB: clinicdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      JWT_SECRET: secret
    ports:
      - "5000:5000"
    depends_on:
      - db
volumes:
  pgdata:
